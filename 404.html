<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found | GiftHaven</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <section class="section" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px;">
    <div class="container" style="max-width: 600px; width: 100%;">
      <div style="font-size: clamp(4rem, 15vw, 8rem); font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1;">404</div>
      <h2 style="font-size: clamp(1.5rem, 5vw, 2.5rem); margin: 16px 0 8px;">Page Not Found</h2>
      <p style="color: var(--text-muted); margin-bottom: 32px; font-size: clamp(0.9rem, 3vw, 1.1rem);">Oops! The page you're looking for doesn't exist.</p>
      <a href="index.html" class="btn btn-primary" style="text-decoration: none; white-space: nowrap;">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
      <a href="javascript:history.back()" class="btn btn-secondary" style="text-decoration: none; white-space: nowrap; margin-left: 12px;">
        <i class="fas fa-undo"></i> Go Back
      </a>
    </div>
  </section>

</body>
</html>
